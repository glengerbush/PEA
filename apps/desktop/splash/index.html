<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>PEA</title>
		<style>
			/* Everforest-flavored splash to match the app theme */
			html,
			body {
				height: 100%;
				margin: 0;
				display: grid;
				place-items: center;
				background: #2d353b;
				color: #d3c6aa;
				font-family: system-ui, sans-serif;
			}
			.wrap {
				text-align: center;
			}
			.spinner {
				width: 42px;
				height: 42px;
				margin: 0 auto 18px;
				border: 4px solid #475258;
				border-top-color: #a7c080;
				border-radius: 50%;
				animation: spin 0.9s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			p {
				opacity: 0.8;
				font-size: 14px;
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<svg width="72" height="72" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
			  <!-- PEA logo candidate D: Bracket Stack -->
			  <rect x="2" y="2" width="60" height="60" rx="14" fill="#3a4248"/>
			  <g fill="none" stroke="#d3c6aa" stroke-width="4" stroke-linecap="round">
			    <path d="M26 16h-7v32h7"/>
			    <path d="M38 16h7v32h-7"/>
			  </g>
			  <circle cx="32" cy="21.5" r="5" fill="#83c092"/>
			  <circle cx="32" cy="32" r="5" fill="#a7c080"/>
			  <circle cx="32" cy="42.5" r="5" fill="#93b06e"/>
			</svg>
			<div class="spinner"></div>
			<h2>PEA</h2>
			<p id="status">Starting the archive engine…</p>
		</div>
	</body>
</html>
