services:
    open-archiver:
        build:
            context: .
            dockerfile: apps/open-archiver/Dockerfile
            args:
                GIT_SHA: ${GIT_SHA:-unknown}
        image: open-archiver:local
        container_name: open-archiver
        restart: unless-stopped
        ports:
            - '127.0.0.1:${PORT_FRONTEND:-3000}:3000' # Frontend, local machine only by default
        env_file:
            - .env
        volumes:
            - archiver-data:${STORAGE_LOCAL_ROOT_PATH:-/var/data/open-archiver}
        depends_on:
            - postgres
            - valkey
            - meilisearch
        networks:
            - open-archiver-net

    postgres:
        image: postgres:17-alpine
        container_name: postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-open_archive}
            POSTGRES_USER: ${POSTGRES_USER:-admin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run npm run setup:local first}
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - open-archiver-net

    valkey:
        image: valkey/valkey:8-alpine
        container_name: valkey
        restart: unless-stopped
        command: valkey-server --requirepass ${REDIS_PASSWORD:?Run npm run setup:local first}
        volumes:
            - valkeydata:/data
        networks:
            - open-archiver-net

    meilisearch:
        image: getmeili/meilisearch:v1.38
        container_name: meilisearch
        restart: unless-stopped
        environment:
            MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Run npm run setup:local first}
            MEILI_SCHEDULE_SNAPSHOT: ${MEILI_SCHEDULE_SNAPSHOT:-86400}
        volumes:
            - meilidata:/meili_data
        networks:
            - open-archiver-net

    tika:
        image: apache/tika:3.2.2.0-full
        container_name: tika
        restart: unless-stopped
        profiles:
            - tika
        networks:
            - open-archiver-net

volumes:
    archiver-data:
        driver: local
    pgdata:
        driver: local
    valkeydata:
        driver: local
    meilidata:
        driver: local

networks:
    open-archiver-net:
        driver: bridge
